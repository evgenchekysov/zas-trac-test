name: "ZAS‑TRAC: новая заявка"
description: "Создать заявку на обслуживание/ремонт"
title: "[ZAS] проблема/работа"
labels:
  - "status:new"
  - "type:request"

body:
  - type: dropdown
    id: room
    attributes:
      label: Объект / Цех / Площадка
      description: "Выберите площадку/цех (для тестовой базы)"
      options:
        - КПП
        - ПБК_43ПО
        - ПК_13Т
        - ПК_4ЭПО
        - ПК_КРОВЛ
        - С_МОБОБ
        - СУШКА
        - СТРОЙБАЗ
        - ФАВОРИТ
    validations:
      required: true

  - type: input
    id: equipment_query
    attributes:
      label: "Оборудование (поиск)"
      description: 'Введите QR‑ID, инв.номер или часть названия. Примеры: "HEN100003ZL3", "100003718", "тележка".'
      placeholder: "например: HEN100003ZL3"
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: "Описание проблемы"
      placeholder: "Что происходит, когда проявляется, последствия"
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: "Приоритет"
      options:
        - низкий
        - средний
        - высокий
        - аварийный
    validations:
      required: true

  - type: textarea
    id: attachments
    attributes:
      label: "Фото / Дополнительно"
      description: "Прикрепляйте фото через стандартный UI GitHub (drag&drop)"
      placeholder: "Дополнительные материалы"
    validations:
      required: false
