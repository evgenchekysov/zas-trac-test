name: Issue Intake (room label + equipment detection)

on:
  issues:
    types: [opened, edited]
  workflow_dispatch:
    inputs:
      issue_number:
        description: Issue number to reprocess (optional)
        required: false
        type: string

permissions:
  contents: write
  issues: write

jobs:
  intake:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run classifier
        id: classify
        run: |
          python scripts/issue_intake.py

      - name: Ensure room label (if any)
        if: ${{ steps.classify.outputs.room != '' }}
        uses: actions/github-script@v7
        with:
          script: |
            const room = `${{ steps.classify.outputs.room }}`;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = context.payload.issue.number;

            const labelName = `room:${room}`;
            // Создаём метку, если её нет
            try {
              await github.rest.issues.getLabel({ owner, repo, name: labelName });
            } catch {
              await github.rest.issues.createLabel({ owner, repo, name: labelName, color: 'D4C5F9' });
            }
            await github.rest.issues.addLabels({ owner, repo, issue_number, labels: [labelName] });

      - name: Post detection comment (once)
        if: ${{ steps.classify.outputs.detected == 'true' }}
        uses: actions/github-script@v7
        with:
          script: |
            const issue_number = context.payload.issue.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const equipment_id = `${{ steps.classify.outputs.equipment_id }}` || '(не определён)';
            const room = `${{ steps.classify.outputs.room }}` || '(не определён)`;

            const body = [
              'Detected equipment:',
              `• equipment_id: ${equipment_id}`,
              `• room: ${room}`
            ].join('\n');

            // Проверим, не публиковали ли уже такой комментарий
            const comments = await github.paginate(github.rest.issues.listComments, { owner, repo, issue_number });
            const exists = comments.some(c => c.body && c.body.includes('Detected equipment:'));
            if (!exists) {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }
